name: Process
on:
  workflow_dispatch:
  schedule:
    - cron: "05 03 * * *"
    - cron: "05 11 * * *"

env:
  TZ: Asia/Shanghai
  # 强制使用本地配置，禁用所有SECRET，避免加载失败秒退
  SUBSCRIBE_CONF: ""
  PUSH_TOKEN: ""
  REACHABLE: "false"
  SKIP_ALIVE_CHECK: "false"
  SKIP_REMARK: "false"
  WORKFLOW_MODE: "local"
  ENABLE_SPECIAL_PROTOCOLS: "true"

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 补全所有缺失依赖，彻底解决导入错误
          pip install requests aiohttp beautifulsoup4 lxml pyyaml pycryptodome

      - name: Run process.py (完整日志输出)
        run: |
          echo "=== 进入subscribe目录，执行主程序 ==="
          cd subscribe
          echo "当前目录: $(pwd)"
          echo "目录文件: $(ls -la)"
          python -u process.py --overwrite 2>&1
          echo "=== 程序执行结束，检查输出目录 ==="
          ls -la output/ || echo "output目录不存在，自动创建"
          mkdir -p output/

      - name: Upload subscription files
        uses: actions/upload-artifact@v4
        with:
          name: aggregator-subscriptions
          path: subscribe/output/**
          retention-days: 30

      - name: Print timestamp
        run: date
