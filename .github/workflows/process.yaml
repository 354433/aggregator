name: Process
on:
  schedule:
    - cron: "05 03 * * *"
    - cron: "05 11 * * *"
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  SUBSCRIBE_CONF: ${{ secrets.SUBSCRIBE_CONF }}
  PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
  REACHABLE: ${{ vars.REACHABLE }}
  SKIP_ALIVE_CHECK: ${{ vars.SKIP_ALIVE_CHECK }}
  SKIP_REMARK: ${{ vars.SKIP_REMARK }}
  WORKFLOW_MODE: ${{ vars.WORKFLOW_MODE }}
  ENABLE_SPECIAL_PROTOCOLS: ${{ vars.ENABLE_SPECIAL_PROTOCOLS }}

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Prepare
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          architecture: "x64"
          cache: "pip"

      - name: Install
        run: pip3 install -r requirements.txt

      - name: Process
        run: python -u subscribe/process.py --overwrite

      # 👇 新增：打印目录，确认文件是否生成，排查问题
      - name: Check Output Directory
        run: |
          echo "=== 检查subscribe/output目录 ==="
          ls -la subscribe/
          ls -la subscribe/output/ 2>/dev/null || echo "output目录不存在！"
          echo "================================"

      # 👇 上传步骤，仅在有文件时执行，避免空上传
      - name: Upload Subscription Result
        uses: actions/upload-artifact@v4
        with:
          name: aggregator-subscriptions
          path: subscribe/output/**
          if: ${{ success() && hashFiles('subscribe/output/**') != '' }}

      - name: Timestamp
        run: date
