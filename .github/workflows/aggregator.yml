name: Aggregator Auto Run

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies (补全核心依赖)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 补全项目依赖，避免缺失报错
          pip install requests aiohttp beautifulsoup4 lxml pyyaml

      - name: Copy config & 打印目录结构
        run: |
          mkdir -p subscribe/config
          cp -f subscribe/config/config.default.json subscribe/config/config.json
          # 打印目录和配置文件，排查路径问题
          ls -la
          ls -la subscribe/config/
          cat subscribe/config/config.json

      - name: Run aggregator (带日志输出)
        run: |
          # 执行脚本并打印完整日志
          python process.py 2>&1

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: aggregator-output
          path: |
            output/
            *.txt
            *.yaml
            *.log
