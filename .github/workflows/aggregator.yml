name: Aggregator Auto Run

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发
  schedule:
    - cron: '0 */6 * * *'  # 每6小时自动运行（UTC时间，对应北京时间+8小时）

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5  # 升级到v5，兼容Node.js 24

      - name: Set up Python
        uses: actions/setup-python@v6  # 升级到v6，兼容Node.js 24
        with:
          python-version: '3.10'
          cache: 'pip'  # 缓存依赖，加速运行

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Copy config (修复路径)
        run: |
          # 确保配置目录存在
          mkdir -p subscribe/config
          # 复制默认配置
          cp -f subscribe/config/config.default.json subscribe/config/config.json
          # 验证配置文件是否生成
          ls -l subscribe/config/

      - name: Run aggregator
        run: |
          python process.py

      - name: Upload result
        uses: actions/upload-artifact@v4  # 最新稳定版
        with:
          name: aggregator-output
          path: |
            output/
            *.txt
            *.yaml
